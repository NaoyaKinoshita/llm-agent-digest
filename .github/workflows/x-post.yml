name: X Post Column

on:
  push:
    branches:
      - main
    paths:
      - 'chiikawa/**/*.md'
  workflow_dispatch:
    inputs:
      files:
        description: '投稿するファイルパス (複数ある場合はスペース区切り。例: chiikawa/2026-07-18_chiikawa-august-info.md)'
        required: true
        default: 'chiikawa/2026-07-18_chiikawa-august-info.md'

jobs:
  x-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # 差分を取得するために depth: 2 以上が必要

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install twitter-api-v2

      - name: Detect added files and post to X
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ADDED_FILES="${{ github.event.inputs.files }}"
          else
            # 今回のプッシュで新規追加(A)された chiikawa 配下の md ファイルを取得
            # 最初のコミットなどで HEAD~1 がない場合はエラー回避のため || true を設定
            ADDED_FILES=$(git diff --diff-filter=A --name-only HEAD~1 HEAD | grep '^chiikawa/.*\.md$' || true)
          fi
          echo "Target files: $ADDED_FILES"
          
          if [ -n "$ADDED_FILES" ]; then
            export ADDED_FILES="$ADDED_FILES"
            node scripts/x-post.mjs
          else
            echo "対象となるコラム記事はありません。"
          fi
